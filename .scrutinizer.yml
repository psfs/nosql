filter:
  excluded_paths:
    - src/bin/*
    - src/command/*
    - src/tests/*
    - src/public/*
    - src/templates/*
    - locale/*
    - cache/*
    - config/*
    - logs/*
    - vendor/*

checks:
  php: true

tools:
  php_cs_fixer:
    config:
      level: psr12

build:
  environment:
    php:
      version: '8.3'
      pecl_extensions:
        - mongodb
      ini:
        memory_limit: "-1"
        xdebug.mode: coverage
  nodes:
    analysis:
      tests:
        override:
          - php-scrutinizer-run
    services-tests:
      services:
        mongo: "8"
        redis: "6"
      environment:
        variables:
          APP_ENVIRONMENT: "test"
          PSFS_REDIS_HOST: "127.0.0.1"
          PSFS_REDIS_PORT: "6379"
          PSFS_REDIS_TIMEOUT: "1.5"
      dependencies:
        override:
          - composer install -o --no-interaction --no-progress --prefer-dist
      project_setup:
        override:
          - true
      tests:
        stop_on_failure: true
        override:
          - command: "XDEBUG_MODE=coverage vendor/bin/phpunit --configuration src/NOSQL/phpunit.xml.dist --colors=never"
            idle_timeout: 1200
            coverage:
              file: "cache/coverage/coverage.xml"
              format: "clover"
